# GabomaGPT · nginx.conf · SmartANDJ AI Technologies
# Production reverse proxy — SSL via Certbot
# Domain: gabomagpt.andjanalytics.com
# VPS: 31.220.80.217
#
# SETUP (run on VPS):
#   sudo apt update && sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/gabomagpt
#   sudo ln -sf /etc/nginx/sites-available/gabomagpt /etc/nginx/sites-enabled/gabomagpt
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d gabomagpt.andjanalytics.com --non-interactive --agree-tos -m daniel@andjanalytics.com
#   sudo systemctl enable nginx

upstream gabomagpt_app {
    server 127.0.0.1:3000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name gabomagpt.andjanalytics.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gabomagpt.andjanalytics.com;

    # SSL certs (Certbot auto-fills these after first run)
    ssl_certificate /etc/letsencrypt/live/gabomagpt.andjanalytics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gabomagpt.andjanalytics.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Performance
    client_max_body_size 100M;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # Healthcheck
    location /nginx-health {
        return 200 '{"status":"ok","service":"gabomagpt-nginx","ssl":true}';
        add_header Content-Type application/json;
    }

    # WebSocket — real-time chat streaming
    location /ws {
        proxy_pass http://gabomagpt_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Socket.IO fallback
    location /socket.io {
        proxy_pass http://gabomagpt_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # API routes — no buffering for streaming
    location /api/ {
        proxy_pass http://gabomagpt_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # OAuth callback
    location /oauth/ {
        proxy_pass http://gabomagpt_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # All other routes — SvelteKit frontend + FastAPI
    location / {
        proxy_pass http://gabomagpt_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
    }
}
