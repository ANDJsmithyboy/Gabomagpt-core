# GabomaGPT · nginx.conf · SmartANDJ AI Technologies
# Reverse proxy — routage vers API + Payment + WebSocket

upstream gabomagpt_api {
    server web:8080;
}

upstream gabomagpt_payment {
    server payment:8001;
}

server {
    listen 80;
    server_name gabomagpt.ga www.gabomagpt.ga localhost;

    client_max_body_size 100M;

    # Healthcheck nginx
    location /nginx-health {
        return 200 '{"status":"ok","service":"gabomagpt-nginx"}';
        add_header Content-Type application/json;
    }

    # WebSocket — connexion temps réel
    location /ws {
        proxy_pass http://gabomagpt_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Webhook SUMB — route directe vers Go (pas de auth)
    location /webhook/sumb {
        proxy_pass http://gabomagpt_payment;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API paiement — proxy vers Go via FastAPI
    location /api/payment/ {
        proxy_pass http://gabomagpt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Toutes les autres routes — FastAPI + SvelteKit
    location / {
        proxy_pass http://gabomagpt_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # Headers sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
