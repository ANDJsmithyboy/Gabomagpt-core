<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/favicon.png" crossorigin="use-credentials" />
		<link
			rel="icon"
			type="image/png"
			href="/favicon-96x96.png"
			sizes="96x96"
			crossorigin="use-credentials"
		/>
		<link
			rel="icon"
			type="image/svg+xml"
			href="/favicon.svg"
			crossorigin="use-credentials"
		/>
		<link rel="shortcut icon" href="/favicon.ico" crossorigin="use-credentials" />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/static/apple-touch-icon.png"
			crossorigin="use-credentials"
		/>
		<link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
		/>
		<meta name="theme-color" content="#171717" />
		<meta name="robots" content="noindex,nofollow" />

		<script src="/static/loader.js" defer crossorigin="use-credentials"></script>
		<link rel="stylesheet" href="/static/custom.css" crossorigin="use-credentials" />

		<script>
			function resizeIframe(obj) {
				obj.style.height = obj.contentWindow.document.documentElement.scrollHeight + 'px';
			}
		</script>

		<script>
			// On page load or when changing themes, best to add inline in `head` to avoid FOUC
			(() => {
				const metaThemeColorTag = document.querySelector('meta[name="theme-color"]');
				const prefersDarkTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;

				if (!localStorage?.theme) {
					localStorage.theme = 'system';
				}

				var zionThemeMap = {
					'sombre': 'sombre', 'dark': 'sombre',
					'noir-oled': 'noir-oled', 'oled-dark': 'noir-oled',
					'bleu-nuit': 'bleu-nuit', 'vert-foret': 'vert-foret'
				};
				var zionMetaMap = {
					'sombre': '#050810', 'dark': '#050810',
					'noir-oled': '#000000', 'oled-dark': '#000000',
					'bleu-nuit': '#05081A', 'vert-foret': '#06150C'
				};
				var storedTheme = localStorage.theme;
				var zionKey = zionThemeMap[storedTheme];

				if (storedTheme === 'system') {
					document.documentElement.classList.add(prefersDarkTheme ? 'dark' : 'light');
					if (prefersDarkTheme) {
						document.documentElement.setAttribute('data-theme', 'sombre');
					}
					metaThemeColorTag.setAttribute('content', prefersDarkTheme ? '#050810' : '#ffffff');
				} else if (zionKey) {
					document.documentElement.classList.add('dark');
					document.documentElement.setAttribute('data-theme', zionKey);
					metaThemeColorTag.setAttribute('content', zionMetaMap[storedTheme] || '#050810');
				} else if (storedTheme === 'light') {
					document.documentElement.classList.add('light');
					metaThemeColorTag.setAttribute('content', '#ffffff');
				} else if (storedTheme === 'her') {
					document.documentElement.classList.add('her');
					metaThemeColorTag.setAttribute('content', '#983724');
				} else {
					document.documentElement.classList.add('dark');
					document.documentElement.setAttribute('data-theme', 'sombre');
					metaThemeColorTag.setAttribute('content', '#050810');
				}

				window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
					if (localStorage.theme === 'system') {
						if (e.matches) {
							document.documentElement.classList.add('dark');
							document.documentElement.classList.remove('light');
							document.documentElement.setAttribute('data-theme', 'sombre');
							metaThemeColorTag.setAttribute('content', '#050810');
						} else {
							document.documentElement.classList.add('light');
							document.documentElement.classList.remove('dark');
							metaThemeColorTag.setAttribute('content', '#ffffff');
						}
					}
				});
				const isDarkMode = document.documentElement.classList.contains('dark');

				const logo = document.createElement('img');
				logo.id = 'logo';
				logo.className = 'splash-logo';
				logo.style =
					'position: absolute; width: auto; height: 7rem; top: 38%; left: 50%; transform: translateX(-50%); display:block; border-radius: 22px;';
				logo.src = '/gabomagpt-logo.jpeg';

				const title = document.createElement('div');
				title.className = 'splash-title';
				title.style =
					'position: absolute; top: 56%; left: 50%; transform: translateX(-50%); font-family: Outfit, sans-serif; font-size: 28px; font-weight: 700; letter-spacing: -0.035em; color: #F0F4FF; text-align: center;';
				title.textContent = 'Mbolo !';

				const subtitle = document.createElement('div');
				subtitle.className = 'splash-subtitle';
				subtitle.style =
					'position: absolute; top: 63%; left: 50%; transform: translateX(-50%); font-family: Sora, sans-serif; font-size: 13px; font-weight: 400; color: #8A9BBE; text-align: center; white-space: nowrap;';
				subtitle.textContent = 'GabomaGPT — IA Souveraine du Gabon';

				document.addEventListener('DOMContentLoaded', function () {
					const splash = document.getElementById('splash-screen');
					if (document.documentElement.classList.contains('her')) {
						return;
					}

					if (splash) {
						splash.prepend(subtitle);
						splash.prepend(title);
						splash.prepend(logo);
					}
				});
			})();
		</script>

		<title>GabomaGPT — IA Souveraine du Gabon</title>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<div
			id="splash-screen"
			style="position: fixed; z-index: 100; top: 0; left: 0; width: 100%; height: 100%"
		>
			<style type="text/css" nonce="">
				html {
					overflow-y: scroll !important;
				}
			</style>

			<div
				style="
					position: absolute;
					top: 33%;
					left: 50%;

					width: 24rem;
					transform: translateX(-50%);

					display: flex;
					flex-direction: column;
					align-items: center;
				"
			>
				<img
					id="logo-her"
					style="width: auto; height: 13rem"
					src="/static/splash.png"
					class="animate-pulse-fast"
				/>

				<div style="position: relative; width: 24rem; margin-top: 0.5rem">
					<div
						id="progress-background"
						style="
							position: absolute;
							width: 100%;
							height: 0.75rem;

							border-radius: 9999px;
							background-color: #fafafa9a;
						"
					></div>

					<div
						id="progress-bar"
						style="
							position: absolute;
							width: 0%;
							height: 0.75rem;
							border-radius: 9999px;
							background-color: #fff;
						"
						class="bg-white"
					></div>
				</div>
			</div>

			<!-- <span style="position: absolute; bottom: 32px; left: 50%; margin: -36px 0 0 -36px">
				Footer content
			</span> -->
		</div>
	</body>

	<style type="text/css" nonce="">
		html {
			overflow-y: hidden !important;
			overscroll-behavior-y: none;
		}

		#splash-screen {
			background: #080B12;
		}

		html.dark #splash-screen {
			background: #080B12;
		}

		html.light #splash-screen {
			background: #080B12;
		}

		html.her #splash-screen {
			background: #983724;
		}

		#logo-her {
			display: none;
		}

		#progress-background {
			display: none;
		}

		#progress-bar {
			display: none;
		}

		html.her #logo {
			display: none;
		}

		html.her #logo-her {
			display: block;
			filter: invert(1);
		}

		html.her #progress-background {
			display: block;
		}

		html.her #progress-bar {
			display: block;
		}

		@media (max-width: 24rem) {
			html.her #progress-background {
				display: none;
			}

			html.her #progress-bar {
				display: none;
			}
		}

		@keyframes pulse {
			50% {
				opacity: 0.65;
			}
		}

		.animate-pulse-fast {
			animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
		}
	</style>
</html>
