services:
  web:
    image: ghcr.io/open-webui/open-webui:main
    container_name: gabomagpt-web
    ports:
      - "3000:8080"
    environment:
      - WEBUI_NAME=GabomaGPT
      - WEBUI_SECRET_KEY=votre_cle_secrete_ici
      - DATABASE_URL=postgresql://gabomagpt:gabomagpt_secret@postgres/gabomagpt
    depends_on:
      - postgres
    networks:
      - gabomagpt-net

  postgres:
    image: postgres:16-alpine
    container_name: gabomagpt-postgres
    environment:
      POSTGRES_USER: gabomagpt
      POSTGRES_PASSWORD: gabomagpt_secret
      POSTGRES_DB: gabomagpt
    networks:
      - gabomagpt-net

networks:
  gabomagpt-net:
    driver: bridge
