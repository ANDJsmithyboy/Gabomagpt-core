# GabomaGPT · docker-compose.prod.yml · SmartANDJ AI Technologies
# Production deployment: Frontend direct sur port 80
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  gabomagpt:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        USE_CUDA: "false"
        USE_OLLAMA: "false"
    container_name: gabomagpt-web
    restart: always
    ports:
      - "80:8080"
    volumes:
      - gabomagpt-data:/app/backend/data
    environment:
      - NODE_OPTIONS=--max-old-space-size=4000
      - WEBUI_NAME=GabomaGPT
      - CUSTOM_NAME=GabomaGPT
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-gabomagpt-secret-change-me}
      - OPENAI_API_BASE_URL=https://api.groq.com/openai/v1
      - OPENAI_API_KEY=${GROQ_API_KEY}
      - RAG_WEB_SEARCH_ENGINE=tavily
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - WEBUI_WORKERS=1
      - ENV=prod
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  gabomagpt-data:
    driver: local
